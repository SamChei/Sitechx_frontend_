<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initialscale=1.0" />
    <title>HTML Fundamentals Course</title>
  </head>
  <body>
    <header>
      <h1>HTML Fundamentals Course</h1>
      <nav aria-label="Course navigation">
        <ul>
          <li><a href="#overview">Overview</a></li>
          <li><a href="#schedule">Schedule</a></li>
          <li><a href="#register">Register</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <article id="overview">
        <h2>Course Overview</h2>
        <p>Learn to structure web content using valid, semantic HTML.</p>
        <img
          src="html-workshop.jpg"
          alt="Laptop showing HTML code
during a workshop"
        />
      </article>
      <section id="schedule">
        <h2>Schedule</h2>
        <table>
          <caption>
            Course schedule
          </caption>
          <tr>
            <th>Week</th>
            <th>Topic</th>
            <th>Output</th>
          </tr>
          <tr>
            <td>1</td>
            <td>Structure</td>
            <td>Starter page</td>
          </tr>
          <tr>
            <td>2</td>
            <td>Forms</td>
            <td>Validated form</td>
          </tr>
        </table>
      </section>
      <section id="register">
        <h2>Register</h2>
        <form action="/register" method="post">
          <label for="name">Name</label>
          <input
            id="name"
            name="name"
            type="text"
            required
            autocomplete="name"
          />
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            required
            autocomplete="email"
          />
          <button type="submit">Submit registration</button>
        </form>
      </section>
    </main>
    <footer> 
      <p>&copy; 2026 HTML Fundamentals Course</p>
    </footer>
  </body>
</html>
