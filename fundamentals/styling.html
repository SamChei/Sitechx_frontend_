<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      <!-- Internal Styling -- > h2 {
        color: blueviolet;
        a :link{
          color: lightblue;
          margin-left: 30px;
          text-decoration: none;

        }
        a :visited{
          color: lightgreen;
          margin-left: 30px;
        }
        a :active{
          color: lightcoral;
          margin-left: 30px;
        }
        a :hover{
          color: lightpink;
          margin-left: 30px;
        }
    </style>
    <title>Document</title>
    <link rel="stylesheet" href="styling1.css" />
  </head>
  <body>
    <h1 style="color: blue">This is an Amazing Class 👌</h1>
    <!-- Inline Styling -->
    <h2>This is a Subheading 👌</h2>

    <!-- External Styling -->
    <h3>This is a Smaller Heading</h3>

    <a href="https://www.google.com" target="_blank">Google</a>
  </body>
</html>
